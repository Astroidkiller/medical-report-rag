services:
  # 1. FastAPI Backend Service
  - type: web
    name: medical-report-rag-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_BACKEND
        value: gemini
      - key: VECTOR_STORE_BACKEND
        value: chromadb
      - key: GEMINI_API_KEY
        sync: false

  # 2. Vite React Frontend Service (Static Site)
  - type: web
    name: medical-report-rag-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://medical-report-rag-backend.onrender.com/api
