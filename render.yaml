services:
  # 1. FastAPI Backend Service
  - type: web
    name: medical-report-rag-backend
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_BACKEND
        value: gemini
      - key: VECTOR_STORE_BACKEND
        value: memory
      - key: GEMINI_API_KEY
        sync: false

  # 2. Vite React Frontend Service (Static Site)
  - type: web
    name: medical-report-rag-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: VITE_API_URL
        value: https://medical-report-rag-backend.onrender.com/api
