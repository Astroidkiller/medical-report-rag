# ============================================================
# Google Cloud Build & Cloud Run Automated CI/CD
# ============================================================
steps:
  # 1. Build Docker image using Artifact Registry / Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/community-health-assistant:$COMMIT_SHA'
      - '.'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/community-health-assistant:$COMMIT_SHA'

  # 3. Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'community-health-assistant'
      - '--image=gcr.io/$PROJECT_ID/community-health-assistant:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/community-health-assistant:$COMMIT_SHA'
